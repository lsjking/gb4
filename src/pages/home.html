<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABS🔵UL</title>

    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="../style/style.css" />

    <!-- HUD 전용 스타일 -->
    <link rel="stylesheet" href="../style/home.css" />
  </head>

  <body>
    <!-- ===== HEADER (style.css 기준) ===== -->
    <header>
      <div class="header-left">
        <a href="../index.html" class="logo">
          <span
            style="
              background: linear-gradient(135deg, #614e9c, #7476d4);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            "
            >🛡️</span
          >
          김정현진과 유청림성준
        </a>

        <ul class="nav-links">
          <li><a href="./home.html">홈</a></li>
          <li><a href="./learn.html">학습</a></li>
          <li><a href="./quiz/quizzes.html">퀴즈</a></li>
        </ul>
      </div>

      <div class="header-right">
        <a href="./team.html" class="team-link">팀 소개</a>
      </div>
    </header>

    <!-- ================================================= -->
    <!-- ✅ HUD 전용 컨테이너 (핵심 추가 부분) ✅ -->
    <!-- ================================================= -->
    <div class="hud-root">
      <!-- ===== STATE MODES ===== -->
      <input type="radio" name="mode" id="mode-standby" checked />
      <input type="radio" name="mode" id="mode-analysis" />
      <input type="radio" name="mode" id="mode-alert" />
      <input type="radio" name="mode" id="mode-sleep" />

      <!-- ===== HUD STATUS ===== -->
      <section class="hud-status">
        <p>
          MODE :
          <label for="mode-standby">STANDBY</label> |
          <label for="mode-analysis">ANALYSIS</label> |
          <label for="mode-alert">ALERT</label> |
          <label for="mode-sleep">SLEEP</label>
        </p>
      </section>

      <!-- ===== ABSOUL + ORBIT ===== -->
      <div class="orbit-wrapper">
        <input type="checkbox" id="menu-toggle" />

        <!-- CORE -->
        <label for="menu-toggle" class="menu-btn">
          <span class="core-glow"></span>
          <span class="core-label">J.A.R.V.I.S</span>
        </label>

        <!-- AI TEXT -->
        <div class="ai-text">
          <span class="standby">IDLE · Awaiting user signal.</span>
          <span class="analysis">SCAN · Analyzing parameters.</span>
          <span class="alert">WARNING · Threat detected.</span>
          <span class="sleep">Minimal cognition active.</span>
        </div>

        <!-- STAGE -->
        <div class="stage" style="--count: 9">
          <div class="orbit" style="--i: 0">
            <a class="ball" href="../index.html"><span>메인</span></a>
          </div>
          <div class="orbit" style="--i: 1">
            <a class="ball" href="team.html"><span>팀소개</span></a>
          </div>
          <div class="orbit" style="--i: 2">
            <a class="ball" href="learn.html"><span>학습</span></a>
          </div>

          <!-- INFO (비활성) -->
          <div class="orbit" style="--i: 3">
            <a class="ball disabled">
              <span>INFO</span>
            </a>
          </div>

          <div class="orbit" style="--i: 4">
            <a class="ball disabled"><span>BLOG</span></a>
          </div>
          <div class="orbit" style="--i: 5">
            <a class="ball disabled"><span>DEV</span></a>
          </div>
          <div class="orbit" style="--i: 6">
            <a class="ball disabled"><span>LAB</span></a>
          </div>
          <div class="orbit" style="--i: 7">
            <a class="ball disabled"><span>help</span></a>
          </div>
          <!-- QUIZ -->
          <div class="orbit" style="--i: 8">
            <a class="ball" href="./quiz/quizzes.html">
              <span>QUIZ</span>
            </a>
          </div>
        </div>
      </div>
    </div>
    <!-- ===== HUD ROOT END ===== -->
  </body>
</html>
